include: base.yaml

description: IIO ADC/DAC io-channels

compatible: "iio,io-channels"

properties:
  io-channels:
    required: true
  io-channel-names:
    required: true
  reg:
    required: true
  io-name:
    type: string
    description: |
      The device name for use within IIOD. If not set, the device's node will be used
      as a fallback.