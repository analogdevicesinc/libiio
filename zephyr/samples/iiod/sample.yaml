sample:
  description: iiod server sample
  name: iiod
common:
  tags: iiod
  harness: console
  harness_config:
    type: one_line
    regex:
      - "Booting Zephyr OS"
tests:
  sample.iiod.network:
    extra_args:
      - SNIPPET=iiod-network
    extra_configs:
      - CONFIG_LIBIIO_IIOD_ADC_EMUL=y
      - CONFIG_LIBIIO_IIOD_SENSOR_EMUL=y
    platform_allow:
      - native_sim

  sample.iiod.network.pytest:
    extra_args:
      - SNIPPET=iiod-network
      - CONFIG_LIBIIO_IIOD_ADC_EMUL=y
      - CONFIG_LIBIIO_IIOD_SENSOR_EMUL=y
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    harness: pytest
    timeout: 120
    harness_config:
      pytest_dut_scope: session
      pytest_args:
        - --iiod-transport=network

  sample.iiod.uart.pytest:
    extra_args:
      - SNIPPET=iiod-console
      - CONFIG_LIBIIO_IIOD_ADC_EMUL=y
      - CONFIG_LIBIIO_IIOD_SENSOR_EMUL=y
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    harness: pytest
    harness_config:
      pytest_dut_scope: session
      pytest_args:
        - --iiod-transport=uart

  sample.iiod.cdc-acm.emul:
    extra_args:
      - SNIPPET=iiod-cdc-acm
    extra_configs:
      - CONFIG_LIBIIO_IIOD_ADC_EMUL=y
      - CONFIG_LIBIIO_IIOD_SENSOR_EMUL=y
    platform_allow:
      - apard32690/max32690/m4
      - adi_sdp_k1
      - frdm_k64f

  sample.iiod.console.emul:
    extra_args:
      - SNIPPET=iiod-console
    extra_configs:
      - CONFIG_LIBIIO_IIOD_ADC_EMUL=y
      - CONFIG_LIBIIO_IIOD_SENSOR_EMUL=y
    platform_allow:
      - apard32690/max32690/m4
      - adi_sdp_k1
      - frdm_k64f

  sample.iiod.console.multi-sensor:
    extra_args:
      - SNIPPET=iiod-console
    extra_configs:
      - CONFIG_LIBIIO_IIOD_SENSOR_ADXL345=y
      - CONFIG_LIBIIO_IIOD_SENSOR_EMUL=y
    platform_allow:
      - apard32690/max32690/m4

  sample.iiod.console.multi-sensor-emul:
    extra_args:
      - SNIPPET=iiod-console
    extra_configs:
      - CONFIG_LIBIIO_IIOD_MULTI_SENSOR_EMUL=y
    platform_allow:
      - apard32690/max32690/m4
      - adi_sdp_k1
      - frdm_k64f

  sample.iiod.console.eval_ad4052_ardz:
    extra_args:
      - SNIPPET=iiod-console
      - SHIELD=eval_ad4052_ardz
    platform_allow:
      - apard32690/max32690/m4

  sample.iiod.console.eval_adxl362_ardz:
    extra_args:
      - SNIPPET=iiod-console
      - SHIELD=eval_adxl362_ardz
    platform_allow:
      - apard32690/max32690/m4
      - frdm_k64f

  sample.iiod.console.pmod_acl:
    extra_args:
      - SNIPPET=iiod-console
      - SHIELD=pmod_acl
    platform_allow:
      - apard32690/max32690/m4

  sample.iiod.console.adc_max32:
    extra_args:
      - SNIPPET=iiod-console
      - EXTRA_DTC_OVERLAY_FILE=adc-max32.overlay
    platform_allow:
      - apard32690/max32690/m4
