name: Documentation Tests

on: [push, pull_request]

permissions:
  contents: write

jobs:
  CheckDocs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.11
        uses: actions/setup-python@v2
        with:
          python-version: 3.11

      - name: Install system dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get install -y git cmake graphviz libavahi-common-dev libavahi-client-dev libaio-dev libusb-1.0-0-dev libxml2-dev rpm tar bzip2 gzip flex bison git libzstd-dev doxygen pandoc

      - name: Set up Python virtual environment
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r doc/requirements_doc.txt

      - name: Build and install libiio (for man pages)
        run: |
          source .venv/bin/activate
          mkdir build
          cd build
          cmake .. -DWITH_MAN=ON -DHAVE_DNS_SD=OFF
          make
          sudo make install

      - name: Build man pages
        run: |
          source .venv/bin/activate
          cd doc
          python man_to_rst.py

      - name: Check doc build
        run: |
          source .venv/bin/activate
          cd doc
          make html SPHINXOPTS="-W"

    #   - name: Check doc coverage
    #     run: |
    #       source .venv/bin/activate
    #       cd doc
    #       make coverage
    #       cat build/coverage/python.txt
    #       cat build/coverage/python.txt | wc -l | xargs -I % test % -eq 2

      # Linkcheck is non-blocking because external links can timeout or be temporarily
      # unavailable. Results are still reported in CI logs for manual review.
      # Contributors should run 'make linkcheck' locally before submitting PRs.
      # See doc/CONTRIBUTING.md for more information.
      - name: Check doc links
        continue-on-error: true
        run: |
          source .venv/bin/activate
          cd doc
          make linkcheck

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Deploy to GitHub Pages (main branch)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/build/html
          destination_dir: main
          keep_files: true
          commit_message: 'Deploy autogenerated docs for libiio main-${{ github.sha }}'

      - name: Deploy to GitHub Pages (version tag)
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/build/html
          destination_dir: v${{ steps.get_version.outputs.VERSION }}
          keep_files: true
          commit_message: 'Deploy autogenerated docs for libiio v${{ steps.get_version.outputs.VERSION }}-${{ github.sha }}'