StylesPath = .github/doc/styles
MinAlertLevel = suggestion


Vocab = Sphinx

[*.rst]
BasedOnStyles = ADI, Vale, Google
# Ignore code blocks, inline code, and headings
BlockIgnores = (?s) *(?:\.\. code-block::.*?)\n\n, (?s)(?:```.*)```
TokenIgnores = (?s)`[^`]+`, (?s)``[^`]+``, https?://[^\s)]+, `[^<]+<https?://[^>]+>`_, ^[=\-~]+$

[*.md]
BasedOnStyles = ADI, Vale, Google
# Ignore code blocks and inline code
BlockIgnores = (?s) *(?:```.*?)```, (?m)^#{1,6}\s.+$
TokenIgnores = (?s)`[^`]+`, https?://[^\s)]+, \[.+?\]\(.+?\)

# Autogenerated tool documentation - treat errors as warnings
[doc/source/tools/*.rst]
BasedOnStyles = ADI, Vale, Google
# Ignore code blocks and inline code
BlockIgnores = (?s) *(?:\.\. code-block::.*?)\n\n, (?s)(?:```.*)```
TokenIgnores = (?s)`[^`]+`, (?s)``[^`]+``, https?://[^\s)]+, `[^<]+<https?://[^>]+>`_
# Lower severity for autogenerated files
Vale.Terms = warning
ADI.Terms = warning
Vale.Spelling = warning
ADI.Spelling = warning
